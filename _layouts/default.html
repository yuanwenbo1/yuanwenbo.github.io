---
layout: base
---

<section class="page-hero">
  <div class="container">
    <p class="eyebrow">{{ page.eyebrow | default: "Knowledge Base" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lead">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="section">
  <div class="container prose">
    {{ content }}
  </div>
</section>
